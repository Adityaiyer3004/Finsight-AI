services:
  api:
    build: .
    container_name: finsight-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: finsight-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finsight_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: